#file: noinspection MaybeTerraformTemplateInspection
openapi: 3.0.1
info:
  version: "3.0"
  title: Upload Service
  description: |
    The Upload Service handles upload related requests
  termsOfService: https://docs.pennsieve.io/page/pennsieve-terms-of-use
  contact:
    name: Pennsieve Support
    email: support@pennsieve.net
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://api2.pennsieve.io/manifest
    description: Production server
  - url: https://api2.pennsieve.net/manifest
    description: Development server
externalDocs:
  description: Find more info here
  url: https://docs.pennsieve.io
tags:
  - name: Upload Service
    description: API for creating and initiating upload manifests. Use this API to inform the platform of the files you are about to upload. This is required in order to upload files to the platform.
    externalDocs:
      url: https://docs.pennsieve.io/reference

paths:
  /manifest:
    get:
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/manifest-service'
      operationId: getManifestList
      summary: List upload manifests for dataset
      description: |
        Returns a list of upload manifests that are defined for a dataset.
      parameters:
        - in: query
          name: dataset_id
          schema:
            type: string
          required: true
          description: The dataset for which we want to retrieve datasets.
      security:
        - token_dataset_auth: [ ]
      tags:
        - Manifest
      responses:
        '200':
          description: A list of manifests.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      description: UUID of the manifest.
                    dataset:
                      type: string
                      description: UUID of the dataset where files will be uploaded to.
                    organization:
                      type: string
                      description: Name of the organization where the dataset is located.
                    status:
                      type: string
                      description: Status of the manifest.
                    created:
                      type: string
                      description: Date when the manifest was created.
                    updated:
                      type: string
                      description: Date when the manifest was last updated.
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
    post:
      summary: Synchronize manifest
      description: |
        Method to create a new manifest on the server, or to synchronize local updates to the server for existing manifests.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/manifest-service'
      operationId: syncManifest
      security:
        - token_dataset_auth: [ ]
      tags:
        - Manifest
      parameters:
        - in: query
          name: dataset_id
          schema:
            type: string
          required: true
          description: The dataset where file will be uploaded.
      requestBody:
        description: Create a new upload manifest with files
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/manifestCreateRequest'
      responses:
        '200':
          description: The created manifest.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/addFilesResponse'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /manifest/files:
    get:
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/manifest-service'
      operationId: getManifestFiles
      summary: Get files for manifest
      security:
        - token_manifest_auth: [ ]
      tags:
        - Manifest
      description: |
        Returns a paginated list of files that are associated with an upload manifest. \
      parameters:
        - in: query
          name: manifest_id
          required: true
          schema:
            type: string
            minimum: 1
          description: The UUID of the Upload Manifest.
        - in: query
          name: continuation_token
          schema:
            type: string
          required: false
          description: The UploadID of the last returned item in the previous page.
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
            maximum: 1000
          description: The number of returned files per page.
        - in: query
          name: status
          schema:
            type: string
            enum:
              - Initiated
              - Synced
              - Imported
              - Finalized
              - Verified
              - Failed
              - Removed
              - Unknown
              - null
          required: false
          description: Filter by upload status.
      responses:
        '200':
          description: The requested files for a manifest.
          content:
            application/json:
              schema:
                type: object
                description: Successfull created new manifest.
                properties:
                  id:
                    type: string
                    description: UUID of the manifest.
                  dataset:
                    type: string
                    description: UUID of the dataset where files will be uploaded to.
                  organization:
                    type: string
                    description: Name of the organization where the dataset is located.
                  status:
                    type: string
                    description: Status of the manifest.
                  created:
                    type: string
                    description: Date when the manifest was created.
                  updated:
                    type: string
                    description: Date when the manifest was last updated.
                  files:
                    $ref: '#/components/schemas/manifestFiles'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /manifest/status:
    get:
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/manifest-service'
      operationId: verifyFileStatus
      summary: Verify status for manifest files
      security:
        - token_manifest_auth: [ ]
      tags:
        - Status
      description: |
        Returns a list of files that have the requested status on the server for the given manifest.\
        \
        You can use this endpoint to check import progress of files during or after uploading a manifest.
      parameters:
        - in: query
          name: manifest_id
          required: true
          schema:
            type: string
            minimum: 1
          description: The UUID of the Upload Manifest.
        - in: query
          name: continuation_token
          schema:
            type: string
          required: false
          description: The UploadID of the last returned item in the previous page.
        - in: query
          name: status
          schema:
            type: string
            enum:
              - Synced
              - Imported
              - Finalized
              - Verified
              - Failed
          required: true
          description: Filter by upload status.
        - in: query
          name: verify
          required: false
          schema:
            type: boolean
          description: Update status to verified for returned files. If checked, this will always check for Finalized status.
      responses:
        '200':
          description: The requested files for a manifest.
          content:
            application/json:
              schema:
                type: object
                description: Successfull returned list of files with requested status.
                properties:
                  id:
                    type: string
                    description: UUID of the manifest.
                  status:
                    type: string
                    description: The current status of the returned files.
                  files:
                    type: array
                    description: List of upload ids for files with requested status.
                    items:
                      type: string
                  continuation_token:
                    type: string
                    description: ID of the last returned item.
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /manifest/upload-credentials:
    post:
      summary: Get temporary S3 upload credentials
      description: |
        Returns temporary AWS credentials scoped to upload files to a specific manifest prefix
        in the uploads S3 bucket. Used by data targets to upload files without requiring
        Cognito refresh tokens.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/manifest-service'
      operationId: getUploadCredentials
      security:
        - token_dataset_auth: [ ]
      tags:
        - Upload
      parameters:
        - in: query
          name: dataset_id
          schema:
            type: string
          required: true
          description: dataset node id
      requestBody:
        description: Manifest node ID to scope credentials to
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - manifestNodeId
              properties:
                manifestNodeId:
                  type: string
                  description: The manifest node ID returned from POST /manifest
      responses:
        '200':
          description: Temporary AWS credentials for S3 upload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/uploadCredentialsResponse'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'

  /manifest/storage-credentials:
    post:
      summary: Get temporary S3 credentials for direct-to-storage upload
      description: |
        Returns temporary AWS credentials scoped to upload files directly to
        the manifest's destination storage bucket under the
        O{orgId}/D{datasetId}/{manifestId}/* prefix. Agents use these
        credentials to skip the legacy upload-bucket staging hop.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/manifest-service'
      operationId: getStorageCredentials
      security:
        - token_dataset_auth: [ ]
      tags:
        - Upload
      parameters:
        - in: query
          name: dataset_id
          schema:
            type: string
          required: true
          description: dataset node id
      requestBody:
        description: Manifest node ID to scope credentials to
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - manifestNodeId
              properties:
                manifestNodeId:
                  type: string
                  description: The manifest node ID returned from POST /manifest
      responses:
        '200':
          description: Temporary AWS credentials for direct-to-storage upload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/storageCredentialsResponse'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'

  /manifest/files/finalize:
    post:
      summary: Finalize a batch of files uploaded direct-to-storage
      description: |
        Completes the two-phase upload for files the agent has already PUT
        directly to the storage bucket. The server verifies each object,
        creates Postgres package/file rows, and marks the manifest file
        Finalized. Idempotent per uploadId. Max 250 files per call.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/manifest-service-finalize'
      operationId: finalizeManifestFiles
      security:
        - token_dataset_auth: [ ]
      tags:
        - Upload
      parameters:
        - in: query
          name: dataset_id
          schema:
            type: string
          required: true
          description: dataset node id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/finalizeFilesRequest'
      responses:
        '200':
          description: Per-file finalize results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/finalizeFilesResponse'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'

  /manifest/archive:
    post:
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/manifest-service'
      operationId: archiveManifest
      summary: Archive manifest to disk
      security:
        - token_manifest_auth: [ ]
      tags:
        - Archive
      description: |
        Archives a manifest by storing the manifest as a CSV file on disk.\
        \
        Manifests can be manually archived, and are archived automatically a month after creation.
      parameters:
        - in: query
          name: manifest_id
          required: true
          schema:
            type: string
            minimum: 1
          description: UUID of the manifest to be archived.
        - in: query
          name: remove
          required: true
          schema:
            type: boolean
            default: false
          description: true if files should be removed from manifest table
      responses:
        '200':
          description: Successfully submitted archive task.
          content:
            application/json:
              schema:
                type: object
                description: Successfull submitted archive task.
                properties:
                  manifest_id:
                    type: string
                    description: UUID of the manifest.
                  message:
                    type: string
                    description: Message indicating action.
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
    get:
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/manifest-service'
      operationId: getManifestArchiveURL
      summary: Get Presigned URL to Manifest archive
      security:
        - token_manifest_auth: [ ]
      tags:
        - Archive
      description: |
        Returns a pre-signed URL to fetch the Manifest Archive CVS file.
      parameters:
        - in: query
          name: manifest_id
          required: true
          schema:
            type: string
            minimum: 1
          description: UUID of the manifest archive to be returned.
      responses:
        '200':
          description: Successfully submitted archive task.
          content:
            application/json:
              schema:
                type: object
                description: Successfull submitted archive task.
                properties:
                  url:
                    type: string
                    description: Presigned url to fetch the manifest archive.
                  message:
                    type: string
                    description: Message indicating action.
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
    delete:
      summary: Delete an upload manifest
      description: |
        This method will permanently delete an upload manifest. \
        \
        The manifest needs to be in 'archived' state before delete is allowed.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/manifest-service'
      operationId: deleteManifestArchive
      security:
        - token_manifest_auth: [ ]
      tags:
        - Archive
      parameters:
        - in: query
          name: manifest_id
          required: true
          schema:
            type: string
            minimum: 1
          description: UUID of the manifest to be deleted.
      responses:
        '200':
          description: Successfully deleted the Dataset Proposal.
          content:
            application/json:
              schema:
                type: object
                description: Successfull submitted archive task.
                properties:
                  message:
                    type: string
                    description: Message indicating action.
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'

components:
  x-amazon-apigateway-integrations:
    manifest-service:
      type: aws_proxy
      uri: ${upload_service_lambda_arn}
      httpMethod: POST
      passthroughBehavior: when_no_match
      contentHandling: CONVERT_TO_TEXT
      payloadFormatVersion: 2.0
    # Finalize does up to 250 per-file HEADs + a synchronous upload-lambda
    # invocation that creates Postgres rows and writes DynamoDB status for
    # each file. Observed p99 ~20s on a 10k-file test; use 29s so a slow
    # batch returns a clean 504 rather than hanging near the API Gateway
    # HTTP v2 default max of 30s. Increase only in lockstep with a lambda
    # timeout bump and an explicit quota request.
    manifest-service-finalize:
      type: aws_proxy
      uri: ${upload_service_lambda_arn}
      httpMethod: POST
      passthroughBehavior: when_no_match
      contentHandling: CONVERT_TO_TEXT
      payloadFormatVersion: 2.0
      timeoutInMillis: 29000
  securitySchemes:
    token_dataset_auth:
      type: "apiKey"
      name: "Unused"
      in: "header"
      x-amazon-apigateway-authorizer:
        identitySource: "$request.header.Authorization,$request.querystring.dataset_id"
        authorizerUri: ${authorize_lambda_invoke_uri}
        authorizerPayloadFormatVersion: "2.0"
        authorizerResultTtlInSeconds: 300
        type: "request"
        enableSimpleResponses: true
        authorizerCredentials: ${gateway_authorizer_role}
    token_manifest_auth:
      type: "apiKey"
      name: "Unused"
      in: "header"
      x-amazon-apigateway-authorizer:
        identitySource: "$request.header.Authorization,$request.querystring.manifest_id"
        authorizerUri: ${authorize_lambda_invoke_uri}
        authorizerPayloadFormatVersion: "2.0"
        authorizerResultTtlInSeconds: 300
        type: "request"
        enableSimpleResponses: true
        authorizerCredentials: ${gateway_authorizer_role}
  responses:
    Unauthorized:
      description: Incorrect authentication or user has incorrect permissions.
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              errorId:
                type: string
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              errorId:
                type: string
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              errorId:
                type: string
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              errorId:
                type: string
    Error:
      description: Server Error
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              errorId:
                type: string
  schemas:
    manifestCreateRequest:
      type: object
      properties:
        id:
          type: string
          description: UUID of the manifest.
        files:
          $ref: '#/components/schemas/manifestFiles'
        options:
          type: object
          additionalProperties: true
          description: |
            Optional configuration options for the manifest. The structure depends
            on the import type. For viewer asset imports, required properties are:
            asset_type (string), properties (object), and provenance_id (UUID string).
            An optional asset_name (string) can trigger single-record mode.
    manifestFiles:
      type: array
      items:
        type: object
        properties:
          uploadId:
            type: string
            description: The upload id for the file.
          s3Key:
            type: string
            description: The S3-key for the uploaded asset. (typically sessionID/uploadID)
          targetPath:
            type: string
            description: Absolute path in the datset where the file should be uploaded to.
          targetName:
            type: string
            description: Name of the uploaded file as it should appear on the platform. This includes the extension of the file.
    uploadCredentialsResponse:
      type: object
      properties:
        accessKeyId:
          type: string
          description: AWS access key ID
        secretAccessKey:
          type: string
          description: AWS secret access key
        sessionToken:
          type: string
          description: AWS session token
        expiration:
          type: string
          format: date-time
          description: When the credentials expire (ISO 8601)
        bucket:
          type: string
          description: S3 bucket name for uploads
        region:
          type: string
          description: AWS region of the upload bucket
    storageCredentialsResponse:
      type: object
      properties:
        accessKeyId:
          type: string
        secretAccessKey:
          type: string
        sessionToken:
          type: string
        expiration:
          type: string
          format: date-time
        bucket:
          type: string
          description: Destination storage bucket for this manifest.
        keyPrefix:
          type: string
          description: Object-key prefix the credentials are scoped to (O{orgId}/D{datasetId}/{manifestId}).
        region:
          type: string
    finalizeFilesRequest:
      type: object
      required:
        - manifestNodeId
        - files
      properties:
        manifestNodeId:
          type: string
          format: uuid
        files:
          type: array
          minItems: 1
          maxItems: 250
          items:
            type: object
            required:
              - uploadId
              - size
              - sha256
            properties:
              uploadId:
                type: string
                format: uuid
              size:
                type: integer
                format: int64
                minimum: 1
              sha256:
                type: string
                description: Base64-encoded SHA256 checksum returned by S3 multipart upload (the ChecksumSHA256 field of manager.UploadOutput). Server verifies this matches the value HEAD returns.
    finalizeFilesResponse:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              uploadId:
                type: string
              status:
                type: string
                enum:
                  - finalized
                  - failed
              error:
                type: string
                description: Present when status = failed.
    addFilesResponse:
      type: object
      description: Response for addFiles endpoint.
      properties:
        nrFilesAdded:
          description: Number of added files to the manifest.
          type: integer
        failedFiles:
          description: Array of uploadIds that were not added to manifest.
          type: array
          items:
            type: string
